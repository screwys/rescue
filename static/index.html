<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rescue!</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Rescue!</h1>
        <p id="server-summary">Starting...</p>
        <p id="copy-help">Click on the black snippets to automatically copy</p>
      </div>
      <div class="status">
        <button id="reset-all" class="reset" type="button">Reset</button>
        <span id="save-state">Loading</span>
      </div>
    </header>

    <main class="workspace">
      <div class="editor-column">
        <section class="section">
          <div class="section-heading">
            <h2>Instructions</h2>
            <button id="add-instruction" type="button">Add instruction</button>
          </div>
          <div id="instructions" class="grid"></div>
        </section>

        <section class="section">
          <div class="section-heading">
            <h2>Scripts</h2>
            <button id="add-script" type="button">Add script</button>
          </div>
          <div id="scripts" class="grid scripts"></div>
        </section>
      </div>

      <aside class="section share-column">
        <div class="section-heading">
          <h2>File sharing</h2>
        </div>
        <form id="file-upload" class="block upload-block">
          <label for="shared-files">Upload</label>
          <input id="shared-files" type="file" name="files" multiple />
          <p id="upload-status" class="hint"></p>
        </form>
        <div class="shared-list-wrap">
          <div class="shared-list-head">
            <h3>Shared files</h3>
            <div class="shared-actions" aria-label="Shared file downloads">
              <button
                id="download-all"
                class="icon-button"
                type="button"
                title="Download all"
                aria-label="Download all shared files"
              ></button>
              <a
                id="download-zip"
                class="icon-button"
                href="/files.zip"
                download="rescue-files.zip"
                title="Download zip"
                aria-label="Download shared files as zip"
              ></a>
            </div>
          </div>
          <ul id="shared-files-list" class="shared-files"></ul>
        </div>
      </aside>
    </main>

    <template id="instruction-template">
      <article class="block">
        <div class="block-head">
          <input class="title-input" aria-label="Instruction title" />
          <button class="remove" type="button" title="Remove">Remove</button>
        </div>
        <textarea class="content-input instruction-body" rows="3" spellcheck="false"></textarea>
        <div class="snippet-row">
          <pre title="Copy" tabindex="0"><code></code></pre>
          <button class="copy-snippet" type="button">Copy</button>
        </div>
      </article>
    </template>

    <template id="script-template">
      <article class="block">
        <div class="block-head">
          <input class="filename-input" aria-label="Script filename" />
          <button class="remove" type="button" title="Remove">Remove</button>
        </div>
        <textarea class="content-input script-body" spellcheck="false"></textarea>
        <div class="snippet-row">
          <div class="run-line" title="Copy" tabindex="0"></div>
          <button class="copy-snippet" type="button">Copy</button>
        </div>
      </article>
    </template>

    <script src="/static/app.js" defer></script>
  </body>
</html>
